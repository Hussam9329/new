<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مغامرات إلياس - رحلة المراحل</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #546e7a;
            --accent: #ff7043;
            --text: #ffffff;
            --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.15);
            --font-main: 'Tajawal', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: var(--text);
        }

        #game-wrapper {
            position: relative;
            width: 960px;
            max-width: 95vw;
            height: 540px;
            max-height: 85vh;
            border-radius: 24px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6), 0 0 0 2px rgba(255,255,255,0.05);
            overflow: hidden;
            background: #1e3c72;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* واجهة المستخدم */
        .hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            z-index: 10;
        }

        @media (max-width: 600px) {
            .hud { padding: 10px 15px; }
            .score-value { font-size: 24px; }
            .level-badge { font-size: 14px; }
        }

        .stats-container {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .score-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .score-label {
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            font-weight: 700;
        }

        .score-value {
            font-size: 32px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        /* شارة المرحلة */
        .level-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(118, 75, 162, 0.4);
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* أزرار التحكم */
        .btn-sound {
            pointer-events: auto;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            color: white;
            font-size: 18px;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            outline: none;
        }
        .btn-sound:hover { background: rgba(255,255,255,0.3); transform: scale(1.1); }

        /* الشاشات المنبثقة */
        .modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 20;
            transition: opacity 0.4s ease;
        }

        .modal.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .modal-content {
            background: rgba(30, 41, 59, 0.95);
            padding: 30px 50px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            max-width: 90%;
        }

        .modal h1 { font-size: 2.5rem; margin-bottom: 15px; font-weight: 900; background: linear-gradient(135deg, #fff, #cbd5e1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .modal p { font-size: 1rem; color: #cbd5e1; margin-bottom: 25px; line-height: 1.5; }

        .btn-primary {
            background: linear-gradient(90deg, #3b82f6, #2563eb);
            border: none;
            padding: 14px 40px;
            font-size: 1.1rem;
            font-weight: 800;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            font-family: var(--font-main);
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
            transition: all 0.3s ease;
            outline: none;
        }
        .btn-primary:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 15px 35px rgba(59, 130, 246, 0.6); }

        /* رسالة تغيير المرحلة */
        #stageMessage {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 4px 15px rgba(0,0,0,0.5);
            opacity: 0;
            pointer-events: none;
            z-index: 15;
            text-align: center;
            width: 100%;
        }
        .stage-subtext {
            display: block;
            font-size: 1.2rem;
            margin-top: 10px;
            font-weight: 400;
            color: #ffeb3b;
        }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <canvas id="gameCanvas"></canvas>

        <div class="hud">
            <div class="stats-container">
                <div class="score-row">
                    <span class="level-badge" id="levelBadge">الغابة - المستوى 1</span>
                </div>
                <div class="score-row">
                    <span class="score-label">النقاط</span>
                    <span id="currentScore" class="score-value">0</span>
                </div>
            </div>
            <button id="soundBtn" class="btn-sound">🔊</button>
        </div>

        <div id="stageMessage">
            <div id="msgTitle">المدينة الليلية</div>
            <span class="stage-subtext">السرعة تزداد!</span>
        </div>

        <div id="startScreen" class="modal">
            <div class="modal-content">
                <h1>مغامرات إلياس</h1>
                <p>سافر عبر 3 بيئات مختلفة<br>تجنب العقبات واجمع النجوم</p>
                <button class="btn-primary" id="startBtn">ابدأ الرحلة</button>
            </div>
        </div>

        <div id="gameOverScreen" class="modal hidden">
            <div class="modal-content">
                <h1 style="background: linear-gradient(to right, #f87171, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">انتهت اللعبة</h1>
                <div style="display: flex; justify-content: center; gap: 30px; margin-bottom: 25px;">
                    <div>
                        <span id="finalScore" style="font-size: 2rem; font-weight: bold; color: #fff; display: block;">0</span>
                        <span style="font-size: 0.8rem; color: #94a3b8;">النقاط</span>
                    </div>
                    <div>
                        <span id="bestScore" style="font-size: 2rem; font-weight: bold; color: var(--accent); display: block;">0</span>
                        <span style="font-size: 0.8rem; color: #94a3b8;">الأفضل</span>
                    </div>
                </div>
                <button class="btn-primary" id="restartBtn">إعادة المحاولة</button>
            </div>
        </div>
    </div>

    <script>
        // --- محرك الصوت ---
        class AudioSynth {
            constructor() {
                this.ctx = null;
                this.muted = false;
            }
            init() {
                if (!this.ctx) {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    this.ctx = new AudioContext();
                }
                if (this.ctx.state === 'suspended') this.ctx.resume();
            }
            playTone(freq, type, duration, vol = 0.1) {
                if (this.muted || !this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                gain.gain.setValueAtTime(0, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(vol, this.ctx.currentTime + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + duration);
            }
            playJump() { this.playTone(300, 'sine', 0.15, 0.1); }
            playCollect() { 
                this.playTone(1200, 'sine', 0.1, 0.05); 
                setTimeout(() => this.playTone(1800, 'sine', 0.1, 0.05), 50); 
            }
            playCrash() { 
                this.playTone(150, 'sawtooth', 0.3, 0.15);
                setTimeout(() => this.playTone(100, 'square', 0.2, 0.1), 50);
            }
            playStageUp() {
                // صوت انتقال المرحلة
                this.playTone(440, 'sine', 0.2, 0.1);
                setTimeout(() => this.playTone(554, 'sine', 0.2, 0.1), 100);
                setTimeout(() => this.playTone(659, 'sine', 0.4, 0.1), 200);
            }
        }
        const audio = new AudioSynth();

        // --- إعدادات اللعبة ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        // تعريف المراحل (Stages Logic)
        const STAGES = [
            {
                name: "الغابة الخضراء",
                id: 1,
                scoreReq: 0,
                speed: 5,
                skyColors: ['#4facfe', '#00f2fe'], // سماوية مشمسة
                groundColor: '#5d4037', // ترب غامق
                grassColor: '#66bb6a', // عشب
                mountainColor: '#81c784',
                obstacleType: 'ground_only' // صخور فقط
            },
            {
                name: "صحراء الغروب",
                id: 2,
                scoreReq: 500, // الانتقال عند 500 نقطة
                speed: 7,
                skyColors: ['#ff9966', '#ff5e62'], // برتقالي غروب
                groundColor: '#e6c229', // رمل
                grassColor: '#d4a017', // رمل غامق
                mountainColor: '#e67e22',
                obstacleType: 'mixed' // طيور وصخور
            },
            {
                name: "المدينة الليلية",
                id: 3,
                scoreReq: 1200,
                speed: 9,
                skyColors: ['#0f2027', '#203a43', '#2c5364'], // ليلي عميق
                groundColor: '#263238', // إسفلت
                grassColor: '#37474f', // حواف
                mountainColor: '#455a64',
                obstacleType: 'flying' // طيور كثيرة وسريعة
            }
        ];

        // متغيرات الحالة
        let currentStageIdx = 0;
        let gameSpeed = 5;
        let targetSpeed = 5;
        let score = 0;
        let highScore = localStorage.getItem('eliasStageScore') || 0;
        let frames = 0;
        let isPlaying = false;
        let animationId;
        let particles = [];
        let floatingTexts = [];
        let transitionMsgAlpha = 0; // لشفافية رسالة المرحلة

        // --- الشخصية (إلياس) ---
        class Player {
            constructor() {
                this.width = 40; this.height = 55;
                this.x = 80;
                this.y = height - 120;
                this.dy = 0;
                this.jumpForce = -11;
                this.gravity = 0.6;   
                this.grounded = false;
                this.jumps = 0;
                this.angle = 0;
                this.squashX = 1; this.squashY = 1;
            }

            update() {
                this.dy += this.gravity;
                this.y += this.dy;

                // Squash & Stretch
                if (!this.grounded) {
                    this.squashX += (0.9 - this.squashX) * 0.1;
                    this.squashY += (1.1 - this.squashY) * 0.1;
                } else {
                    this.squashX += (1 - this.squashX) * 0.1;
                    this.squashY += (1 - this.squashY) * 0.1;
                }

                const groundLevel = height - 60;
                if (this.y + this.height > groundLevel) {
                    this.y = groundLevel - this.height;
                    this.dy = 0;
                    if (!this.grounded) {
                        this.squashY = 0.8; this.squashX = 1.2;
                        spawnDust(this.x + this.width/2, this.y + this.height);
                    }
                    this.grounded = true;
                    this.jumps = 0;
                    this.angle = 0;
                } else {
                    this.grounded = false;
                    if(this.dy < 0) this.angle = -10;
                    else this.angle += 4;
                    if(this.angle > 15) this.angle = 15;
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x + this.width/2, this.y + this.height/2);
                ctx.rotate(this.angle * Math.PI / 180);
                ctx.scale(this.squashX, this.squashY);

                // رسم الجسم (بسط)
                function roundRect(ctx, x, y, w, h, r) {
                    ctx.beginPath(); ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r); ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h); ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r); ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y); ctx.fill();
                }
                
                // قميص
                ctx.fillStyle = '#eceff1';
                roundRect(ctx, -15, 10, 30, 25, 6);
                // رأس
                ctx.fillStyle = '#ffdbac'; ctx.beginPath(); ctx.ellipse(0, -5, 14, 16, 0, 0, Math.PI*2); ctx.fill();
                // عين
                ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.ellipse(6, -5, 4, 4.5, 0, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#3e2723'; ctx.beginPath(); ctx.arc(7, -4, 2, 0, Math.PI*2); ctx.fill();
                // شعر
                ctx.fillStyle = '#222';
                ctx.beginPath(); ctx.moveTo(-14, -5); ctx.quadraticCurveTo(-16, -22, 0, -24); ctx.quadraticCurveTo(16, -22, 14, -5); ctx.fill();
                // تجعيدات
                ctx.strokeStyle = '#000'; ctx.lineWidth = 1.5;
                for(let i=0; i<3; i++) { ctx.beginPath(); ctx.arc(0, -16 + (i*5), 3, 0, Math.PI, false); ctx.stroke(); }

                ctx.restore();
            }

            jump() {
                if (this.jumps < 2) {
                    this.dy = this.jumpForce;
                    this.jumps++;
                    this.grounded = false;
                    audio.playJump();
                    this.squashX = 1.2; this.squashY = 0.8;
                    spawnDust(this.x + this.width/2, this.y + this.height);
                }
            }
        }

        function spawnDust(x, y) {
            for(let i=0; i<4; i++) particles.push(new Particle(x, y, 'rgba(255,255,255,0.5)'));
        }

        // --- الجسيمات والنصوص ---
        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.size = Math.random() * 4 + 2;
                this.speedX = (Math.random() - 0.5) * 4;
                this.speedY = (Math.random() - 1) * 3;
                this.color = color; this.life = 1; this.decay = 0.03;
            }
            update() { this.x += this.speedX; this.y += this.speedY; this.life -= this.decay; this.size *= 0.95; }
            draw() {
                ctx.globalAlpha = Math.max(0, this.life); ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
                ctx.globalAlpha = 1;
            }
        }
        class FloatingText {
            constructor(x, y, text) { this.x = x; this.y = y; this.text = text; this.life = 1; this.speedY = 1; }
            update() { this.y -= this.speedY; this.life -= 0.02; }
            draw() {
                ctx.globalAlpha = Math.max(0, this.life); ctx.fillStyle = '#ffeb3b';
                ctx.font = '900 20px Tajawal'; ctx.shadowColor = '#000'; ctx.shadowBlur = 4;
                ctx.fillText(this.text, this.x, this.y); ctx.shadowBlur = 0; ctx.globalAlpha = 1;
            }
        }

        // --- العقبات (تتغير حسب المرحلة) ---
        class Obstacle {
            constructor() {
                const stage = STAGES[currentStageIdx];
                
                // تحديد نوع العقبة بناء على المرحلة
                let typeRand = Math.random();
                
                if (stage.obstacleType === 'ground_only') {
                    this.type = 'rock';
                } else if (stage.obstacleType === 'mixed') {
                    this.type = typeRand > 0.6 ? 'bird' : 'rock';
                } else { // flying
                    this.type = typeRand > 0.3 ? 'bird' : 'rock';
                }

                this.w = this.type === 'rock' ? 40 : 45;
                this.h = this.type === 'rock' ? 35 : 30;
                this.x = width;

                if (this.type === 'bird') {
                    // ارتفاعات الطيور تختلف قليلاً
                    this.y = height - 60 - this.h - 20 - Math.random() * 70;
                } else {
                    this.y = height - 60 - this.h;
                }
                this.marked = false;
            }
            update() { this.x -= gameSpeed; if(this.x + this.w < 0) this.marked = true; }
            draw() {
                if (this.type === 'rock') {
                    ctx.fillStyle = '#546e7a';
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y + this.h);
                    ctx.lineTo(this.x + 10, this.y + 5);
                    ctx.lineTo(this.x + this.w - 5, this.y);
                    ctx.lineTo(this.x + this.w, this.y + this.h);
                    ctx.fill();
                } else {
                    ctx.fillStyle = '#e53935';
                    // جسم
                    ctx.beginPath(); ctx.ellipse(this.x + this.w/2, this.y + this.h/2, this.w/2, this.h/2.5, 0, 0, Math.PI*2); ctx.fill();
                    // جناح
                    let wingY = Math.sin(frames * 0.3) * 8;
                    ctx.fillStyle = '#ffcdd2';
                    ctx.beginPath(); ctx.ellipse(this.x + this.w/2, this.y + this.h/2 - 5 + wingY, 10, 4, 0.2, 0, Math.PI*2); ctx.fill();
                }
            }
        }

        // --- النجوم ---
        class Star {
            constructor() {
                this.size = 12; this.x = width; this.y = Math.random() * (height - 180) + 80;
                this.marked = false; this.rotation = 0;
            }
            update() { this.x -= gameSpeed; this.rotation += 0.05; if(this.x + this.size < 0) this.marked = true; }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.rotation);
                ctx.fillStyle = '#ffd700'; ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 10;
                ctx.beginPath(); const spikes = 5;
                for(let i=0; i<spikes*2; i++){
                    const r = (i%2 === 0) ? this.size : this.size/2;
                    const a = (i * Math.PI / spikes);
                    ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
                }
                ctx.closePath(); ctx.fill(); ctx.restore();
            }
        }

        // --- الخلفية الديناميكية ---
        class Layer {
            constructor(speedMod) { this.speedMod = speedMod; this.x = 0; }
            update() { this.x -= gameSpeed * this.speedMod; if(this.x <= -width) this.x = 0; }
            draw() { this.drawSingle(this.x); this.drawSingle(this.x + width); }
            drawSingle(xPos) {
                const stage = STAGES[currentStageIdx];
                
                // رسم الجبال
                ctx.fillStyle = stage.mountainColor;
                ctx.beginPath();
                ctx.moveTo(xPos, height - 60);
                ctx.lineTo(xPos + width/3, height - 200);
                ctx.lineTo(xPos + width*0.6, height - 100);
                ctx.lineTo(xPos + width, height - 60);
                ctx.fill();

                // رسم الأرض
                ctx.fillStyle = stage.groundColor;
                ctx.fillRect(xPos, height - 60, width + 2, 60);
                
                // رسم العشب/الحدود
                ctx.fillStyle = stage.grassColor;
                ctx.fillRect(xPos, height - 60, width + 2, 10);
            }
        }

        // --- المتغيرات ---
        let player;
        let obstacles = [];
        let stars = [];
        let bgLayers = [];

        function init() {
            resize();
            player = new Player();
            obstacles = []; stars = []; particles = []; floatingTexts = [];
            score = 0; frames = 0;
            currentStageIdx = 0; // العودة للمرحلة الأولى
            updateStageSettings();
            
            isPlaying = true;
            document.getElementById('currentScore').innerText = '0';
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('stageMessage').style.opacity = 0;
            
            audio.init();
            if (animationId) cancelAnimationFrame(animationId);
            animate();
        }

        function updateStageSettings() {
            const stage = STAGES[currentStageIdx];
            targetSpeed = stage.speed;
            document.getElementById('levelBadge').innerText = `${stage.name} - مستوى ${stage.id}`;
        }

        function checkLevelUp() {
            // التحقق من الوصول للمرحلة التالية
            if (currentStageIdx < STAGES.length - 1) {
                if (score >= STAGES[currentStageIdx + 1].scoreReq) {
                    currentStageIdx++;
                    showStageMessage(STAGES[currentStageIdx].name);
                    audio.playStageUp();
                    updateStageSettings();
                }
            } else {
                // في المرحلة الأخيرة، نزيد السرعة تدريجياً فقط
                if (frames % 500 === 0 && targetSpeed < 13) targetSpeed += 0.5;
            }

            // تنعيم (Smoothing) تغيير السرعة
            gameSpeed += (targetSpeed - gameSpeed) * 0.01;
        }

        function showStageMessage(text) {
            const msg = document.getElementById('stageMessage');
            document.getElementById('msgTitle').innerText = text;
            msg.style.transition = 'none';
            msg.style.opacity = 1;
            msg.style.transform = 'translate(-50%, -50%) scale(1.2)';
            
            setTimeout(() => {
                msg.style.transition = 'all 1s ease';
                msg.style.opacity = 0;
                msg.style.transform = 'translate(-50%, -50%) scale(1)';
            }, 2000);
        }

        function resize() {
            const container = document.getElementById('game-wrapper');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            width = canvas.width; height = canvas.height;
            if(player) player.y = height - 60 - player.height;
        }
        window.addEventListener('resize', resize);

        function animate() {
            if (!isPlaying) return;

            checkLevelUp();

            // رسم السماء المتدرجة حسب المرحلة
            const stage = STAGES[currentStageIdx];
            const skyGrad = ctx.createLinearGradient(0, 0, 0, height);
            skyGrad.addColorStop(0, stage.skyColors[0]);
            skyGrad.addColorStop(1, stage.skyColors[1] || stage.skyColors[0]);
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, width, height);

            // رسم سحب خفيفة
            ctx.fillStyle = 'rgba(255,255,255,0.05)';
            const cloudX = (frames * 0.5) % (width + 200) - 100;
            ctx.beginPath(); ctx.arc(cloudX, 100, 60, 0, Math.PI*2); ctx.arc(cloudX+50, 110, 70, 0, Math.PI*2); ctx.fill();

            bgLayers.forEach(layer => { layer.update(); layer.draw(); });

            player.update(); player.draw();

            // توليد العقبات (منطقي وليس فوضوي)
            // المسافة بين العقبات تعتمد على السرعة لضمان إمكانية القفز
            const minGap = Math.floor(250 + (gameSpeed * 15)); 
            if (frames % minGap === 0) { obstacles.push(new Obstacle()); }

            obstacles.forEach((obs, index) => {
                obs.update(); obs.draw();
                
                const hitMargin = 8; 
                if (
                    player.x + hitMargin < obs.x + obs.w - hitMargin &&
                    player.x + player.width - hitMargin > obs.x + hitMargin &&
                    player.y + hitMargin < obs.y + obs.h - hitMargin &&
                    player.y + player.height - hitMargin > obs.y + hitMargin
                ) { triggerGameOver(); }
                if (obs.marked) obstacles.splice(index, 1);
            });

            if (frames % 100 === 0 && Math.random() > 0.3) stars.push(new Star());
            stars.forEach((star, index) => {
                star.update(); star.draw();
                const dx = (player.x + player.width/2) - star.x;
                const dy = (player.y + player.height/2) - star.y;
                if (Math.sqrt(dx*dx + dy*dy) < 35) {
                    score += 10;
                    document.getElementById('currentScore').innerText = score;
                    audio.playCollect();
                    floatingTexts.push(new FloatingText(player.x, player.y, "+10"));
                    for(let i=0; i<5; i++) particles.push(new Particle(star.x, star.y, '#ffd700'));
                    stars.splice(index, 1);
                } else if (star.marked) stars.splice(index, 1);
            });

            particles.forEach((p, i) => { p.update(); p.draw(); if(p.life <= 0) particles.splice(i, 1); });
            floatingTexts.forEach((t, i) => { t.update(); t.draw(); if(t.life <= 0) floatingTexts.splice(i, 1); });

            frames++;
            animationId = requestAnimationFrame(animate);
        }

        function triggerGameOver() {
            isPlaying = false;
            cancelAnimationFrame(animationId);
            audio.playCrash();
            if(score > highScore) { highScore = score; localStorage.setItem('eliasStageScore', highScore); }
            document.getElementById('finalScore').innerText = score;
            document.getElementById('bestScore').innerText = highScore;
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }

        function handleInput(e) {
            if(e.code === 'Space') e.preventDefault();
            if (!isPlaying) return;
            if ((e.code === 'Space' || e.code === 'ArrowUp' || e.type === 'touchstart' || e.type === 'mousedown')) {
                if(e.target.tagName === 'BUTTON') return;
                player.jump();
            }
        }

        window.addEventListener('keydown', handleInput);
        window.addEventListener('touchstart', handleInput, {passive: false});
        window.addEventListener('mousedown', handleInput);

        document.getElementById('startBtn').addEventListener('click', init);
        document.getElementById('restartBtn').addEventListener('click', init);
        const soundBtn = document.getElementById('soundBtn');
        soundBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            audio.muted = !audio.muted;
            soundBtn.innerText = audio.muted ? '🔇' : '🔊';
        });

        // التهيئة الأولية
        bgLayers = [new Layer(0.2), new Layer(0.5)];
        resize();
        
        // رسم خلفية ثابتة في البداية
        const initialCtx = canvas.getContext('2d');
        const iGrad = initialCtx.createLinearGradient(0, 0, 0, height);
        iGrad.addColorStop(0, '#4facfe'); iGrad.addColorStop(1, '#00f2fe');
        initialCtx.fillStyle = iGrad; initialCtx.fillRect(0,0,width,height);
        initialCtx.fillStyle = '#66bb6a'; initialCtx.fillRect(0, height-60, width, 60);

    </script>
</body>
</html>
